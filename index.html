<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎳 아르케 존 볼링 클럽</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎳</text></svg>">
</head>
<body>
  <!-- PIN 잠금화면 -->
  <div id="lock-screen">
    <div class="lock-container">
      <div class="lock-icon">🎳</div>
      <h1>아르케 존</h1>
      <p class="lock-sub">정기 번개 점수 기록</p>
      <div class="pin-input-group">
        <input type="password" id="pin-input" maxlength="4" placeholder="PIN 4자리" inputmode="numeric" autocomplete="off">
        <button class="btn btn-primary" id="btn-pin-enter">입장</button>
      </div>
      <p id="pin-error" style="color:var(--danger);font-size:0.8rem;margin-top:8px;display:none;">잘못된 PIN입니다</p>
    </div>
  </div>

  <div id="app-wrap" style="display:none;">
  <header>
    <h1>🎳 아르케 존</h1>
    <p class="subtitle">정기 번개 점수 기록</p>
    <span id="role-badge" class="role-badge"></span>
    <button id="btn-logout" class="btn-logout" title="로그아웃">🔓</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="home">🏠 홈</button>
    <button class="tab-btn" data-tab="session">📝 점수</button>
    <button class="tab-btn" data-tab="records">📊 기록</button>
    <button class="tab-btn" data-tab="ranking">🏆 랭킹</button>
    <button class="tab-btn" data-tab="members">👥 회원</button>
  </nav>

  <main>
    <!-- 홈 -->
    <section id="tab-home" class="tab-content active">
      <div class="card">
        <h2>최근 모임</h2>
        <div id="recent-session"></div>
      </div>
      <div class="card">
        <h2>클럽 통계</h2>
        <div id="club-stats"></div>
      </div>
    </section>

    <!-- 점수 입력 (세션 기반) -->
    <section id="tab-session" class="tab-content">
      <!-- STEP 1: 모임 설정 -->
      <div class="card" id="session-step1">
        <h2>모임 설정</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="session-round">회차</label>
            <input type="number" id="session-round" min="1" placeholder="예: 5">
          </div>
          <div class="form-group">
            <label for="session-date">날짜</label>
            <input type="date" id="session-date">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="session-games">모임 유형</label>
            <select id="session-games">
              <option value="3">정모 (3게임)</option>
              <option value="4">벙개 (4게임)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="session-score-type">점수 기준</label>
            <select id="session-score-type">
              <option value="average">에버 기준</option>
              <option value="totalpin">총핀 기준</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="session-team-size">팀 인원</label>
            <select id="session-team-size">
              <option value="4">4인팀</option>
              <option value="5" selected>5인팀</option>
              <option value="6">6인팀</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>참가 회원</label>
          <div id="session-member-checks" class="checkbox-grid"></div>
          <div style="margin-top:6px;display:flex;gap:6px;">
            <button class="btn btn-small" id="btn-sel-all">전체선택</button>
            <button class="btn btn-small" id="btn-desel-all">전체해제</button>
          </div>
        </div>
        <div class="form-group">
          <label>게스트 추가</label>
          <div class="inline-form" style="margin-bottom:6px;">
            <input type="text" id="guest-name" placeholder="이름" style="flex:1;">
            <input type="number" id="guest-base" placeholder="기준에버" min="0" max="300" style="width:90px;">
            <button class="btn btn-small" id="btn-add-guest" type="button">+ 추가</button>
          </div>
          <div id="guest-list"></div>
        </div>
        <div id="participant-summary" style="margin-bottom:10px;font-size:0.85rem;color:var(--text-light);"></div>
        <button class="btn btn-primary" id="btn-make-teams">🎲 팀 구성 & 점수 입력</button>
      </div>

      <!-- STEP 2: 팀 확인 -->
      <div class="card" id="session-step2" style="display:none;">
        <h2>팀 구성</h2>
        <div id="team-result"></div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn btn-small" id="btn-shuffle">🔀 다시 섞기</button>
          <button class="btn btn-primary" id="btn-start-input">✏️ 점수 입력</button>
        </div>
      </div>

      <!-- STEP 3: 점수표 (엑셀 형태) -->
      <div id="session-step3" style="display:none;">
        <div class="card">
          <h2 id="scoring-title">점수 입력</h2>
          <p class="scoring-sub" id="scoring-sub"></p>
          <div class="table-scroll">
            <table class="score-table" id="individual-table"></table>
          </div>
        </div>
        <div class="card">
          <h2>팀전 (오차 합계)</h2>
          <div id="team-score-tables"></div>
        </div>
        <div style="display:flex;gap:8px;margin:12px 0;">
          <button class="btn btn-small" id="btn-back-teams">← 팀 수정</button>
          <button class="btn btn-primary" id="btn-save-session">💾 저장</button>
        </div>
      </div>

      <!-- 저장된 세션 목록 -->
      <div class="card">
        <h2>저장된 모임</h2>
        <div id="session-list"></div>
      </div>
    </section>

    <!-- 기록 조회 -->
    <section id="tab-records" class="tab-content">
      <div class="card">
        <h2>기록 조회</h2>
        <div class="filter-row">
          <div class="form-group">
            <label for="filter-type">유형</label>
            <select id="filter-type">
              <option value="">전체</option>
              <option value="정모">정모</option>
              <option value="벙개">벙개</option>
            </select>
          </div>
          <div class="form-group">
            <label for="filter-round">회차</label>
            <select id="filter-round"><option value="">전체</option></select>
          </div>
          <div class="form-group">
            <label for="filter-member">회원</label>
            <select id="filter-member"><option value="">전체</option></select>
          </div>
          <button class="btn btn-small" id="btn-filter">조회</button>
        </div>
      </div>
      <div id="records-session-detail"></div>
      <div class="card" id="records-table-card" style="display:none;"><div id="records-table"></div></div>
      <div class="card" id="personal-stats-card" style="display:none;">
        <h2 id="personal-stats-title">개인 통계</h2>
        <div id="personal-stats"></div>
      </div>
    </section>

    <!-- 랭킹 -->
    <section id="tab-ranking" class="tab-content">
      <div class="card">
        <h2>🏆 랭킹</h2>
        <div class="filter-row">
          <div class="form-group">
            <label for="rank-period">기간</label>
            <select id="rank-period">
              <option value="all">전체</option>
              <option value="month" selected>이번 달</option>
              <option value="recent5">최근 5회</option>
            </select>
          </div>
          <button class="btn btn-small" id="btn-rank-filter">조회</button>
        </div>
      </div>
      <div class="card"><h3>에버 랭킹</h3><div id="avg-ranking"></div></div>
      <div class="card"><h3>하이스코어</h3><div id="high-scores"></div></div>
    </section>

    <!-- 회원 관리 -->
    <section id="tab-members" class="tab-content">
      <div class="card">
        <h2>회원 관리</h2>
        <form id="member-form" class="inline-form">
          <input type="text" id="new-member-name" placeholder="이름" required>
          <input type="number" id="new-member-base" placeholder="기준에버" min="0" max="300" style="width:90px;">
          <button type="submit" class="btn btn-primary btn-small">추가</button>
        </form>
      </div>
      <div class="card">
        <h2>기준에버 관리</h2>
        <div class="filter-row" style="margin-bottom:12px;">
          <div class="form-group">
            <label for="base-year">년도</label>
            <select id="base-year"></select>
          </div>
          <div class="form-group">
            <label for="base-quarter">분기</label>
            <select id="base-quarter">
              <option value="Q1">1분기 (1~3월)</option>
              <option value="Q2">2분기 (4~6월)</option>
              <option value="Q3">3분기 (7~9월)</option>
              <option value="Q4">4분기 (10~12월)</option>
            </select>
          </div>
          <button class="btn btn-small" id="btn-base-view">조회</button>
        </div>
        <div id="base-score-list"></div>
      </div>
      <div class="card">
        <h2>회원 목록 (<span id="member-count">0</span>명)</h2>
        <div id="member-list"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <div class="settings-toggle" id="settings-toggle">⚙️</div>
  <div class="settings-panel" id="settings-panel" style="display:none;">
    <div class="card">
      <h3>설정</h3>
      <div class="form-group">
        <label for="api-url">Google Apps Script URL</label>
        <input type="url" id="api-url" placeholder="https://script.google.com/macros/s/...">
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="demo-mode" checked> 데모 모드 (로컬 저장)</label>
      </div>
      <button class="btn btn-primary btn-small" id="btn-save-settings">저장</button>
      <button class="btn btn-small" id="btn-export">내보내기(JSON)</button>
      <button class="btn btn-small" id="btn-import">가져오기</button>
      <input type="file" id="import-file" accept=".json" style="display:none;">
    </div>
  </div>

  </div><!-- /app-wrap -->

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
